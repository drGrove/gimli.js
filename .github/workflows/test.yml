name: Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: drgrove/gimlijs-tools@sha256:44c8dabd2a14f259f935113ab84a0bf86c02a986092e3120fcf16d14f97dda15

    steps:
    - name: Checkout code
      run: |
        git config --global --add safe.directory /__w/gimli.js/gimli.js
        git init
        git remote add origin https://github.com/${{ github.repository }}
        git fetch --depth=1 origin ${{ github.event.after }}
        git checkout FETCH_HEAD

    - name: Install dependencies
      run: npm ci --ignore-scripts

    - name: Run tests
      run: npm test
